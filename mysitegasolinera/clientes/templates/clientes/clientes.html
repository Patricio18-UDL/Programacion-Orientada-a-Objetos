{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes | Sistema Gasolinera</title>
    <base href="{% static 'clientes/' %}">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-2xl overflow-hidden">
        
        <div class="bg-emerald-600 px-8 py-6 flex items-center justify-between">
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight">Registro de Clientes</h2>
                <p class="text-emerald-100 text-sm mt-1">Módulo de Administración de la Gasolinera</p>
            </div>
            <svg class="w-10 h-10 text-white opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
        </div>

        <form class="px-8 py-8 space-y-6" action="" method="POST">
            {% csrf_token %} <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre(s)</label>
                    <input type="text" name="nombre" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition duration-200 outline-none" placeholder="Ej. Carlos Patricio">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Apellidos</label>
                    <input type="text" name="apellidos" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition duration-200 outline-none" placeholder="Ej. Negrete Escobar">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">RFC</label>
                    <input type="text" name="rfc" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition duration-200 outline-none uppercase" placeholder="XAXX010101000">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Teléfono de Contacto</label>
                    <input type="tel" name="telefono" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition duration-200 outline-none" placeholder="477 123 4567">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Correo Electrónico</label>
                <input type="email" name="correo" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition duration-200 outline-none" placeholder="cliente@empresa.com">
            </div>

            <div class="flex items-center justify-end pt-6 border-t border-gray-200 gap-4 mt-8">
                <button type="reset" class="px-6 py-3 text-sm font-bold text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition duration-200">
                    Limpiar Datos
                </button>
                <button type="submit" class="px-6 py-3 text-sm font-bold text-white bg-emerald-600 rounded-lg hover:bg-emerald-700 shadow-lg shadow-emerald-500/30 transition duration-200">
                    Guardar Cliente
                </button>
            </div>
        </form>
    </div>

</body>
</html>
