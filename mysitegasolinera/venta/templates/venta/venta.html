{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ventas | Sistema Gasolinera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-2xl overflow-hidden">
        
        <div class="bg-amber-500 px-8 py-6 flex items-center justify-between">
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight">Registro de Venta</h2>
                <p class="text-amber-50 text-sm mt-1">Bitácora de despacho de combustible</p>
            </div>
            <svg class="w-10 h-10 text-white opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
        </div>

        <form class="px-8 py-8 space-y-6" action="" method="POST">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Seleccionar Cliente</label>
                    <select name="cliente" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 focus:border-transparent transition outline-none">
                        <option value="">Público en general</option>
                        </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Bomba #</label>
                    <input type="number" name="bomba" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 focus:border-transparent transition outline-none" placeholder="00">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Tipo de Combustible</label>
                    <select name="combustible" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 focus:border-transparent transition outline-none">
                        <option value="magna">Magna</option>
                        <option value="premium">Premium</option>
                        <option value="diesel">Diésel</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Litros</label>
                    <input type="number" step="0.01" name="litros" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 focus:border-transparent transition outline-none" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Monto Total ($)</label>
                    <input type="number" step="0.01" name="monto" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-amber-500 focus:border-transparent transition outline-none" placeholder="0.00">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Método de Pago</label>
                <div class="flex gap-4">
                    <label class="flex items-center space-x-2">
                        <input type="radio" name="pago" value="efectivo" checked class="text-amber-600 focus:ring-amber-500">
                        <span>Efectivo</span>
                    </label>
                    <label class="flex items-center space-x-2">
                        <input type="radio" name="pago" value="tarjeta" class="text-amber-600 focus:ring-amber-500">
                        <span>Tarjeta</span>
                    </label>
                    <label class="flex items-center space-x-2">
                        <input type="radio" name="pago" value="credito" class="text-amber-600 focus:ring-amber-500">
                        <span>Crédito</span>
                    </label>
                </div>
            </div>

            <div class="flex items-center justify-end pt-6 border-t border-gray-200 gap-4 mt-8">
                <button type="reset" class="px-6 py-3 text-sm font-bold text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition">
                    Cancelar
                </button>
                <button type="submit" class="px-6 py-3 text-sm font-bold text-white bg-amber-500 rounded-lg hover:bg-amber-600 shadow-lg shadow-amber-500/30 transition">
                    Registrar Venta
                </button>
            </div>
        </form>
    </div>

</body>
</html>
